
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: noize
      POSTGRES_PASSWORD: noizepass
      POSTGRES_DB: noize_db
    ports:
      - 5432:5432
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U noize -d noize_db"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    ports:
      - 6379:6379
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    env_file:
      - ./backend/.env.example
    environment:
      REDIS_HOST: redis
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - 8000:8000
    volumes:
      - ./backend/app:/app/app
      - ./backend/scripts:/app/scripts

volumes:
  db-data:
  redis-data:
